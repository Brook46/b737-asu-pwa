<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16294c"/>
      <stop offset="1" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="therm" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e0453f"/>
      <stop offset=".5" stop-color="#f4c04a"/>
      <stop offset="1" stop-color="#8ccf45"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#c7d3e6"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a7a5b"/><stop offset="1" stop-color="#7c5f45"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="52%">
      <stop offset="0" stop-color="#f4c04a" stop-opacity=".4"/>
      <stop offset="1" stop-color="#f4c04a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="114" fill="#132445"/>
  <rect width="512" height="512" rx="114" fill="url(#sky)"/>
  <circle cx="256" cy="298" r="196" fill="url(#glow)"/>

  <!-- smooth tapered thermal -->
  <path d="M256 488 C214 452 300 424 260 392 C226 364 300 336 264 306"
        fill="none" stroke="url(#therm)" stroke-width="26" stroke-linecap="round"/>

  <!-- symmetric feathered wings -->
  <g fill="url(#wing)" stroke="#aab7cd" stroke-width="3.5" stroke-linejoin="round">
    <path d="M198 246
             C150 214 108 214 78 224 C104 232 108 244 142 250
             C104 258 100 276 82 288 C118 280 128 292 160 284
             C150 302 150 318 214 274 Z"/>
    <path d="M314 246
             C362 214 404 214 434 224 C408 232 404 244 370 250
             C408 258 412 276 430 288 C394 280 384 292 352 284
             C362 302 362 318 298 274 Z"/>
  </g>

  <!-- monkey -->
  <g stroke-linejoin="round">
    <circle cx="180" cy="244" r="40" fill="url(#fur)"/>
    <circle cx="332" cy="244" r="40" fill="url(#fur)"/>
    <circle cx="180" cy="244" r="21" fill="#d9b489"/>
    <circle cx="332" cy="244" r="21" fill="#d9b489"/>

    <circle cx="256" cy="250" r="92" fill="url(#fur)"/>
    <path d="M256 196 C300 196 320 236 320 272 C320 312 292 338 256 338
             C220 338 192 312 192 272 C192 236 212 196 256 196 Z" fill="#e9d4b2"/>

    <!-- brows -->
    <path d="M206 214 q28 -16 52 2" fill="none" stroke="#4a3524" stroke-width="8" stroke-linecap="round"/>
    <path d="M306 212 q-26 -14 -50 4" fill="none" stroke="#4a3524" stroke-width="8" stroke-linecap="round"/>

    <!-- eyes: lively, tidy -->
    <ellipse cx="226" cy="240" rx="26" ry="28" fill="#fff"/>
    <ellipse cx="286" cy="238" rx="27" ry="29" fill="#fff"/>
    <circle cx="231" cy="244" r="11" fill="#17202b"/>
    <circle cx="282" cy="242" r="11.5" fill="#17202b"/>
    <circle cx="235" cy="240" r="3.4" fill="#fff"/>
    <circle cx="286" cy="238" r="3.6" fill="#fff"/>

    <!-- nose + grin -->
    <ellipse cx="245" cy="290" rx="4.6" ry="6" fill="#5a4636"/>
    <ellipse cx="267" cy="290" rx="4.6" ry="6" fill="#5a4636"/>
    <path d="M222 302 Q256 340 290 302" fill="none" stroke="#3a2a1e" stroke-width="7" stroke-linecap="round"/>
    <path d="M236 312 q20 14 40 0" fill="none" stroke="#3a2a1e" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
