<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Sky Monkeys — free soaring forecast</title>
  <meta name="theme-color" content="#0a0f1a">
  <meta name="description" content="Free soaring weather on the map: gridded thermal forecast, cloud base, wind, KK7 thermal maps and live pilots — for paraglider, hang-glider and sailplane pilots.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Sky Monkeys">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Leaflet (CDN; cached by the service worker; powers the map).
       Raster tiles + plain-DOM rendering = works on every device, no WebGL. -->
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="app.css?v=5">
</head>
<body>
  <!-- The map IS the app -->
  <div id="bigmap" class="bigmap"></div>

  <!-- Floating header -->
  <header class="topbar">
    <button id="loc-btn" class="loc-chip" aria-label="Change location">
      <svg class="brand-mark" viewBox="0 0 48 48" width="24" height="24" aria-hidden="true">
        <g fill="#eef3fb" stroke="#b7c2d6" stroke-width=".7" stroke-linejoin="round">
          <path d="M17 23C9 18.5 4 20.5 2 22.5c4 1 4 3 9 3-4 2-4 4-6 5 4-1 6 1 10-1z"/>
          <path d="M31 23c8-4.5 13-2.5 15-.5-4 1-4 3-9 3 4 2 4 4 6 5-4-1-6 1-10-1z"/>
        </g>
        <circle cx="16" cy="23" r="5" fill="#7d6047"/><circle cx="32" cy="23" r="5" fill="#7d6047"/>
        <circle cx="24" cy="24" r="11" fill="#8d6e52"/>
        <ellipse cx="24" cy="28" rx="8" ry="6" fill="#ecd8b6"/>
        <circle cx="20.5" cy="22" r="4.3" fill="#fff"/><circle cx="28" cy="21.5" r="4.7" fill="#fff"/>
        <circle cx="21.5" cy="23" r="1.9" fill="#14181f"/><circle cx="27" cy="20.5" r="2.1" fill="#14181f"/>
        <path d="M20 29q4 4 8 0" fill="none" stroke="#2f2016" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M23.5 30h3v2q-1.5 1-3 0z" fill="#fbfdff"/>
      </svg>
      <span id="loc-name">Locating…</span>
      <span class="loc-chevron">▾</span>
    </button>
    <button id="units-btn" class="chip-btn glass" title="Toggle units">m·km/h</button>
  </header>

  <!-- Tool column (left) -->
  <div class="tools">
    <button id="rec-btn" class="tool-btn" aria-pressed="false" title="Best launch + route to maximise the day">
      <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round">
        <path d="M12 3l2.1 4.7 5.1.5-3.9 3.4 1.2 5-4.5-2.7-4.5 2.7 1.2-5L4.8 8.2l5.1-.5z"/>
      </svg>
    </button>
    <button id="tk-btn" class="tool-btn" aria-pressed="false" title="Rank takeoffs in view">
      <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2.3" fill="currentColor" stroke="none"/>
        <line x1="12" y1="1.5" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="22.5"/>
        <line x1="1.5" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="22.5" y2="12"/>
      </svg>
    </button>
    <button id="plan-btn" class="tool-btn" aria-pressed="false" title="Plan an XC task">
      <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round">
        <circle cx="5.5" cy="18.5" r="2.4"/><circle cx="18.5" cy="5.5" r="2.4"/>
        <path d="M7.6 16.8 12 12l-1.4-3.8 4.4 1.2 1.4-1.4"/>
      </svg>
    </button>
  </div>

  <!-- Status / error banner -->
  <div id="status" class="status hidden"></div>

  <!-- Recommendation summary toast -->
  <div id="rec-toast" class="rec-toast hidden">
    <div class="rec-toast-body"></div>
    <button id="rec-clear" class="rec-clear" aria-label="Clear suggestion">✕</button>
  </div>

  <!-- Planning bar (only in plan mode) -->
  <div id="plan-bar" class="plan-bar hidden">
    <div class="plan-info">
      <span id="plan-stats" class="plan-stats">Tap the map to drop turnpoints</span>
    </div>
    <div class="plan-ctrls">
      <label class="plan-radius">cyl
        <input id="plan-radius" type="range" min="100" max="5000" step="100" value="400" aria-label="Cylinder radius">
        <span id="plan-radius-val">400 m</span>
      </label>
      <button id="plan-undo" class="chip-btn">Undo</button>
      <button id="plan-clear" class="chip-btn">Clear</button>
      <button id="plan-done" class="chip-btn">Done</button>
    </div>
  </div>

  <!-- Bottom dock: weather layer + time controls -->
  <div class="dock">
    <div class="dock-row">
      <div id="legend" class="legend"></div>
      <span id="tk-count" class="pilot-count"></span>
      <span id="pilot-count" class="pilot-count"></span>
    </div>
    <div class="chip-scroll">
      <div id="layer-chips" class="layer-chips" role="tablist" aria-label="Weather colour layer"></div>
      <span class="chip-sep" aria-hidden="true"></span>
      <button id="wind-toggle" class="toggle-chip" aria-pressed="false" title="Wind barbs">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <line x1="4" y1="9" x2="17" y2="9"/><path d="M17 9a2.5 2.5 0 1 0-2.5 2.5"/>
          <line x1="4" y1="14" x2="13" y2="14"/><path d="M13 14a2 2 0 1 1-2 2"/>
        </svg>Wind</button>
      <button id="conv-toggle" class="toggle-chip" aria-pressed="false" title="Convergence lines (lift)">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8h6M6 5l3 3-3 3"/><path d="M21 8h-6M18 5l-3 3 3 3" transform="translate(0 4)"/>
        </svg>Converg</button>
    </div>
    <nav id="day-tabs" class="day-tabs" aria-label="Forecast day"></nav>
    <div class="time-row">
      <input id="hour-slider" type="range" min="0" max="23" value="13" step="1" aria-label="Hour of day">
      <button id="fc-open" class="fc-btn" aria-label="Open point forecast">
        <span id="hour-readout" class="hour-readout">—</span>
        <span class="fc-btn-arrow">▲</span>
      </button>
    </div>
  </div>

  <!-- Point-forecast bottom sheet -->
  <div id="fc-sheet" class="sheet hidden" role="region" aria-label="Point forecast">
    <div class="sheet-panel fc-panel">
      <div class="sheet-head">
        <h2 id="fc-title">Forecast</h2>
        <button id="fc-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <section id="summary" class="summary-card"></section>
      <section class="charts">
        <div class="chart-wrap">
          <canvas id="th-chart" class="th-chart" height="240"></canvas>
        </div>
        <div class="wind-wrap">
          <canvas id="wind-chart" class="wind-chart" height="240" width="84"></canvas>
        </div>
      </section>
      <div id="chart-legend" class="legend"></div>
      <section id="detail" class="detail-grid"></section>
      <p class="disclaimer">
        Model guidance only — never a substitute for your own eyes, judgement and a proper
        pre-flight check. Weather: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a>
        · hotspots: <a href="https://thermal.kk7.ch" target="_blank" rel="noopener">kk7</a>
        · pilots: <a href="https://live.glidernet.org" target="_blank" rel="noopener">OGN</a>.
      </p>
    </div>
  </div>

  <!-- Location sheet -->
  <div id="loc-sheet" class="sheet hidden" role="region" aria-label="Choose location">
    <div class="sheet-panel">
      <div class="sheet-head">
        <h2>Location</h2>
        <button id="loc-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div class="search-row">
        <input id="search-input" type="search" placeholder="Search a place…" autocomplete="off" enterkeyhint="search">
      </div>
      <div id="search-results" class="search-results"></div>
      <button id="use-gps" class="wide-btn">
        <span>📍</span> Use my location
      </button>
      <div class="model-row">
        <label for="model-select">Weather model</label>
        <select id="model-select" class="model-select" aria-label="Weather model"></select>
      </div>
      <h3 class="saved-head">Saved spots</h3>
      <div id="saved-list" class="saved-list"></div>
    </div>
  </div>

  <script type="module" src="app.js?v=5"></script>
</body>
</html>
