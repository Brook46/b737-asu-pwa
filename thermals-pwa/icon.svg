<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1730"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#29b6f6"/>
      <stop offset="0.5" stop-color="#26a69a"/>
      <stop offset="1" stop-color="#ffd600"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>
  <!-- ridge line -->
  <path d="M0 400 L120 330 L210 380 L320 300 L420 360 L512 320 L512 512 L0 512 Z" fill="#0e1a2e"/>
  <!-- paraglider canopy -->
  <path d="M96 196 Q256 96 416 196" fill="none" stroke="url(#canopy)" stroke-width="34" stroke-linecap="round"/>
  <!-- riser lines -->
  <g stroke="#cdd9ec" stroke-width="6" stroke-linecap="round">
    <line x1="112" y1="206" x2="248" y2="318"/>
    <line x1="200" y1="200" x2="256" y2="318"/>
    <line x1="312" y1="200" x2="264" y2="318"/>
    <line x1="400" y1="206" x2="272" y2="318"/>
  </g>
  <!-- pilot -->
  <circle cx="256" cy="338" r="26" fill="#ffd600"/>
</svg>
