<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141a22"/>
      <stop offset="1" stop-color="#070b11"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5a4d"/>
      <stop offset="0.5" stop-color="#e2201a"/>
      <stop offset="1" stop-color="#9c0f0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#ff6a5e" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff6a5e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- red glow halo -->
  <rect x="70" y="120" width="372" height="272" rx="60" fill="url(#glow)"/>
  <!-- master warning annunciator -->
  <rect x="116" y="156" width="280" height="200" rx="26" fill="url(#lamp)" stroke="#ffb0a8" stroke-width="6"/>
  <rect x="116" y="156" width="280" height="200" rx="26" fill="none" stroke="#5c0705" stroke-width="2"/>
  <text x="256" y="248" text-anchor="middle" font-family="Barlow, Arial, sans-serif" font-weight="700" font-size="58" letter-spacing="4" fill="#fff">MASTER</text>
  <text x="256" y="316" text-anchor="middle" font-family="Barlow, Arial, sans-serif" font-weight="700" font-size="58" letter-spacing="4" fill="#fff">WARNING</text>
</svg>
