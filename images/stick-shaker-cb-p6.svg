<svg viewBox="0 0 600 640" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d403f"/>
      <stop offset="1" stop-color="#2c2e2d"/>
    </linearGradient>
    <radialGradient id="cbCap" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="cbCapHi" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#3a2010"/>
      <stop offset="1" stop-color="#180800"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="600" height="640" fill="#0e1116"/>

  <text x="300" y="30" text-anchor="middle" fill="#e6e8ea" font-size="16" font-weight="700" letter-spacing="0.08em">P6-1 · STICK SHAKER — RIGHT</text>
  <text x="300" y="50" text-anchor="middle" fill="#ff6b60" font-size="11" font-weight="700" letter-spacing="0.1em">ROW B · COL 3 · C1393 · 5 A</text>

  <!-- Panel overview -->
  <g transform="translate(20,70)">
    <path d="M 180 0 L 560 0 L 560 300 L 0 300 L 0 85 Z" fill="url(#panelBg)" stroke="#1a1a1a" stroke-width="2"/>
    <text x="530" y="288" fill="#9aa0a6" font-size="9" letter-spacing="0.1em">P6 – 1</text>

    <!-- Row A dimmed -->
    <g transform="translate(0,15)" opacity="0.35">
      <text x="547" y="40" text-anchor="end" fill="#9aa0a6" font-size="8">A</text>
      <circle cx="200" cy="32" r="7" fill="url(#cbCap)"/>
      <circle cx="245" cy="32" r="7" fill="url(#cbCap)"/>
      <circle cx="278" cy="32" r="7" fill="url(#cbCap)"/>
      <circle cx="310" cy="32" r="7" fill="url(#cbCap)"/>
      <circle cx="345" cy="32" r="7" fill="url(#cbCap)"/>
      <circle cx="385" cy="32" r="7" fill="url(#cbCap)"/>
      <circle cx="428" cy="32" r="7" fill="url(#cbCap)"/>
    </g>

    <!-- Row B focus -->
    <g transform="translate(0,72)">
      <text x="547" y="45" text-anchor="end" fill="#e6e8ea" font-size="8" font-weight="700">B</text>
      <g font-size="6.3" fill="#c9ccd0" text-anchor="middle">
        <text x="90" y="10">SMYD-2</text>
        <text x="70" y="20">SNSR</text><text x="70" y="26">EXC AC</text>
        <text x="110" y="20">CMPTR</text><text x="110" y="26">DC</text>
        <text x="150" y="20">STICK</text><text x="150" y="26">SHAKER RIGHT</text>
        <text x="200" y="20">MACH</text><text x="200" y="26">WARN SYS-2</text>
        <text x="290" y="10">ENTERTAINMENT</text>
        <text x="272" y="20">IFE</text><text x="272" y="26">AC</text>
        <text x="310" y="20">IFE</text><text x="310" y="26">DC</text>
      </g>
      <circle cx="70" cy="42" r="7" fill="url(#cbCap)"/><text x="70" y="45" fill="#e6e8ea" font-size="6.5" text-anchor="middle">2.5</text>
      <circle cx="110" cy="42" r="7" fill="url(#cbCap)"/><text x="110" y="45" fill="#e6e8ea" font-size="6.5" text-anchor="middle">5</text>
      <circle cx="150" cy="42" r="16" fill="none" stroke="#ff3b30" stroke-width="2.5" filter="url(#glow)"/>
      <circle cx="150" cy="42" r="7" fill="url(#cbCapHi)" stroke="#ff6b60" stroke-width="1"/>
      <text x="150" y="45" fill="#ffb1a8" font-size="6.5" font-weight="700" text-anchor="middle">5</text>
      <text x="150" y="68" fill="#ff6b60" font-size="7" font-weight="700" text-anchor="middle">B3</text>
      <circle cx="200" cy="42" r="7" fill="url(#cbCap)"/><text x="200" y="45" fill="#e6e8ea" font-size="6.5" text-anchor="middle">3</text>
      <circle cx="272" cy="42" r="7" fill="url(#cbCap)"/><text x="272" y="45" fill="#e6e8ea" font-size="6.5" text-anchor="middle">7.5</text>
      <circle cx="310" cy="42" r="7" fill="url(#cbCap)"/><text x="310" y="45" fill="#e6e8ea" font-size="6.5" text-anchor="middle">5</text>
    </g>

    <!-- Rows C, D dimmed -->
    <g transform="translate(0,148)" opacity="0.3">
      <text x="547" y="40" text-anchor="end" fill="#9aa0a6" font-size="8">C</text>
      <circle cx="40" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="150" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="200" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="410" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="450" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="510" cy="35" r="6" fill="url(#cbCap)"/>
    </g>
    <g transform="translate(0,205)" opacity="0.3">
      <text x="547" y="40" text-anchor="end" fill="#9aa0a6" font-size="8">D</text>
      <circle cx="60" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="100" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="140" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="180" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="220" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="260" cy="35" r="6" fill="url(#cbCap)"/>
      <circle cx="300" cy="35" r="6" fill="url(#cbCap)"/>
    </g>
  </g>

  <!-- Close-up -->
  <g transform="translate(20,390)">
