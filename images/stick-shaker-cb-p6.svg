    <text x="18" y="24" fill="#9aa0a6" font-size="10" letter-spacing="0.1em">CLOSE-UP · ROW B</text>

    <g font-size="9" fill="#c9ccd0" text-anchor="middle">
      <text x="145" y="52">SMYD-2</text>
      <text x="105" y="70">SNSR</text><text x="105" y="82">EXC AC</text>
      <text x="185" y="70">CMPTR</text><text x="185" y="82">DC</text>
      <text x="265" y="62">STICK</text><text x="265" y="72">SHAKER</text><text x="265" y="82">RIGHT</text>
      <text x="345" y="70">MACH WARN</text><text x="345" y="82">SYS-2</text>
      <text x="425" y="82">(empty)</text>
      <text x="505" y="70">IFE</text><text x="505" y="82">AC</text>
    </g>

    <circle cx="105" cy="130" r="18" fill="url(#cbCap)" stroke="#111" stroke-width="1"/>
    <text x="105" y="135" fill="#e6e8ea" font-size="11" text-anchor="middle">2.5</text>
    <text x="105" y="163" fill="#7a8087" font-size="9" text-anchor="middle">C1207</text>
    <text x="105" y="180" fill="#9aa0a6" font-size="10" text-anchor="middle" font-weight="600">B1</text>

    <circle cx="185" cy="130" r="18" fill="url(#cbCap)" stroke="#111" stroke-width="1"/>
    <text x="185" y="135" fill="#e6e8ea" font-size="11" text-anchor="middle">5</text>
    <text x="185" y="163" fill="#7a8087" font-size="9" text-anchor="middle">C1206</text>
    <text x="185" y="180" fill="#9aa0a6" font-size="10" text-anchor="middle" font-weight="600">B2</text>

    <circle cx="265" cy="130" r="34" fill="none" stroke="#ff3b30" stroke-width="3" opacity="0.9"/>
    <circle cx="265" cy="130" r="27" fill="none" stroke="#ff3b30" stroke-width="1.5" opacity="0.5"/>
    <circle cx="265" cy="130" r="18" fill="url(#cbCapHi)" stroke="#ff6b60" stroke-width="1.5"/>
    <text x="265" y="135" fill="#ffb1a8" font-size="11" text-anchor="middle" font-weight="700">5</text>
    <text x="265" y="163" fill="#ff6b60" font-size="9" text-anchor="middle" font-weight="700">C1393</text>
    <text x="265" y="180" fill="#ff6b60" font-size="11" text-anchor="middle" font-weight="800">B3</text>

    <circle cx="345" cy="130" r="18" fill="url(#cbCap)" stroke="#111" stroke-width="1"/>
    <text x="345" y="135" fill="#e6e8ea" font-size="11" text-anchor="middle">3</text>
    <text x="345" y="163" fill="#7a8087" font-size="9" text-anchor="middle">C549</text>
    <text x="345" y="180" fill="#9aa0a6" font-size="10" text-anchor="middle" font-weight="600">B4</text>

    <circle cx="425" cy="130" r="18" fill="none" stroke="#3a3d40" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="425" y="180" fill="#5a6067" font-size="10" text-anchor="middle">B5</text>

    <circle cx="505" cy="130" r="18" fill="url(#cbCap)" stroke="#111" stroke-width="1"/>
    <text x="505" y="135" fill="#e6e8ea" font-size="11" text-anchor="middle">7.5</text>
    <text x="505" y="163" fill="#7a8087" font-size="9" text-anchor="middle">C1945</text>
    <text x="505" y="180" fill="#9aa0a6" font-size="10" text-anchor="middle" font-weight="600">B6</text>

    <text x="280" y="215" text-anchor="middle" fill="#8a9199" font-size="10">Behind F/O · P6 panel, section 1 · Row B, third breaker from left</text>
  </g>
</svg>
