<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Flight Card — a cockpit companion for the Boeing 737NG. Tap to open." />
  <title>Flight Card</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;       --fg: #18181b;
      --fg-dim: #6b7280;
      --card: #ffffff;     --line: #e5e7eb;
      --accent: #1e6fd1;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0c0e;     --fg: #f4f4f5;
        --fg-dim: #9ca3af;
        --card: #16181c;   --line: #2a2d33;
        --accent: #5fa8ff;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--fg);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 18px;
      min-height: 100%;
    }
    main {
      max-width: 420px; width: 100%;
      text-align: center;
    }
    .logo {
      width: 84px; height: 84px;
      margin: 0 auto 20px;
      display: block;
    }
    h1 {
      font-size: 26px; margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    p.lede {
      color: var(--fg-dim); margin: 0 0 24px;
      font-size: 15px;
    }
    .cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      padding: 14px 22px; border-radius: 12px;
      font-weight: 600; font-size: 16px;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(30,111,209,0.25);
    }
    .cta:hover { opacity: .92; }
    .meta {
      color: var(--fg-dim);
      font-size: 12px;
      margin-top: 26px;
    }
    .meta a { color: inherit; text-decoration: underline; }
  </style>
</head>
<body>

  <main>
    <img class="logo" src="./icon.svg" alt="Flight Card icon" />
    <h1>Flight Card</h1>
    <p class="lede">
      A cockpit companion for the Boeing 737NG —
      data card, checklist, PA library, OPT screenshot reader,
      and per-leg state. Runs as a PWA, works offline.
    </p>
    <a class="cta" href="./">Open Flight Card →</a>
    <p class="meta">
      On iPhone / iPad: open in Safari, then tap Share &gt;
      <i>Add to Home Screen</i> to install. <a href="./menu.html">What's in it</a>.
    </p>
  </main>

</body>
</html>
