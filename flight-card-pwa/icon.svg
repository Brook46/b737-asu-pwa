<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#5fa8ff"/>
      <stop offset="55%" stop-color="#1e6fd1"/>
      <stop offset="100%" stop-color="#0a3a8c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity=".30"/>
      <stop offset="55%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#g)"/>
  <rect x="0" y="0" width="256" height="128" rx="56" ry="56" fill="url(#shine)"/>

  <!-- Checklist body -->
  <rect x="56" y="56" width="144" height="156" rx="14" ry="14" fill="#ffffff" opacity="0.95"/>
  <!-- Clip top -->
  <rect x="104" y="44" width="48" height="20" rx="6" ry="6" fill="#0a3a8c"/>

  <!-- Three lines with checks -->
  <g stroke="#0a3a8c" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M 78 102 l 8 8 l 16 -16"/>
    <path d="M 78 138 l 8 8 l 16 -16"/>
    <path d="M 78 174 l 8 8 l 16 -16"/>
  </g>
  <g stroke="#1e6fd1" stroke-width="10" stroke-linecap="round" opacity=".55">
    <line x1="118" y1="106" x2="180" y2="106"/>
    <line x1="118" y1="142" x2="180" y2="142"/>
    <line x1="118" y1="178" x2="170" y2="178"/>
  </g>

  <!-- Small airplane silhouette over the clip -->
  <g transform="translate(128 54) rotate(-30)" fill="#fff">
    <path d="M -10 0 L -3 -1.2 L -2 -7 L 0 -7 L 1 -1 L 9 -1 L 10 0 L 9 1 L 1 1 L 0 7 L -2 7 L -3 1.2 Z"/>
  </g>
</svg>
