<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Liquid Glass Dark cockpit background — matches the app backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%"   stop-color="#0f1c20"/>
      <stop offset="48%"  stop-color="#0b1016"/>
      <stop offset="100%" stop-color="#070c10"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0.82" cy="-0.05" r="0.75">
      <stop offset="0%"  stop-color="#2f5b56" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#2f5b56" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#7FB8B3" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#7FB8B3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7FB8B3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A5D8D2"/>
      <stop offset="55%"  stop-color="#7FB8B3"/>
      <stop offset="100%" stop-color="#3E8B85"/>
    </linearGradient>
    <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (iOS applies its own rounded-rect mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#topGlow)"/>
  <rect width="1024" height="512"  fill="url(#topSheen)"/>

  <!-- Soft teal glow behind the mark -->
  <circle cx="512" cy="500" r="360" fill="url(#planeGlow)"/>

  <!-- Plane-takeoff mark (Material "flight takeoff", the app's own leg-Now
       glyph) scaled to fill and tinted with the teal gradient. -->
  <g transform="translate(512 512) scale(34) translate(-12 -11.6)" fill="url(#teal)">
    <path d="M2.5 19h19v2h-19v-2zm19.07-9.94c-.21-.79-1.02-1.26-1.81-1.05L14.92 9.36 8.46 3.36l-1.93.52 3.88 6.71L5.79 11.74l-1.55-1.21-1.45.39 2.02 3.51.81 1.41 1.55-.41 5.7-1.52 4.86-1.3 4.83-1.29c.79-.21 1.26-1.02 1.05-1.81z"/>
  </g>
</svg>
